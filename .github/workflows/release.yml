name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build & publish release binaries (daemon + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build, package, and checksum all platforms
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/shruggietech/go-schedule/internal/buildinfo.Version=${VERSION}"
          mkdir -p dist

          # The daemon (goschedd) and CLI (gosched) are cgo-free and cross-compile
          # cleanly for Linux/macOS (servers / headless). Windows is distributed
          # exclusively as a formal .msi (built in the gui job), so it is NOT
          # cross-compiled into a portable archive here.
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for target in $targets; do
            os=${target%/*}; arch=${target#*/}

            stage="go-schedule_${VERSION}_${os}_${arch}"
            mkdir -p "$stage"
            echo "==> $os/$arch"
            GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "$stage/goschedd" ./cmd/goschedd
            GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "$stage/gosched" ./cmd/gosched
            cp README.md LICENSE CHANGELOG.md "$stage/"
            tar -czf "dist/${stage}.tar.gz" "$stage"
            rm -rf "$stage"
          done

          ( cd dist && sha256sum * > SHA256SUMS.txt )
          echo "--- artifacts ---"; ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Cross-platform **go-schedule**.

            **Windows — download `go-schedule_<ver>_windows_amd64.msi`.** A formal system
            installer: it installs to Program Files, registers the background service
            (auto-start), and adds a Start-Menu shortcut. No extracting, no running an exe
            from Downloads. Uninstall via Apps & features.

            **macOS desktop — download `go-schedule-desktop_<ver>_darwin_<arch>`** (GUI +
            daemon + CLI). **Linux/macOS servers / headless — download
            `go-schedule_<ver>_<os>_<arch>`** (daemon + CLI only). Register it to start on
            boot:

            ```
            sudo ./gosched service install   # admin/root required
            sudo ./gosched service start
            ```

            Verify downloads against `SHA256SUMS.txt`. See the README and the Windows install
            guide for details.
          files: |
            dist/*.tar.gz
            dist/*.msi
            dist/SHA256SUMS.txt

  gui:
    name: Build & publish GUI (${{ matrix.os }})
    needs: binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            ldflags: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            ldflags: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            ldflags: "-H windowsgui"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev

      # Embed the .exe file icon (shown in Explorer/taskbar) via a generated COFF
      # resource. The .syso is built here, not committed: a Windows-format .syso
      # would break the CGO-free `go build ./...` path on other platforms, and it
      # only links cleanly under the external (cgo) linker the GUI build uses.
      - name: Generate Windows executable icon resource
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # -64 is required: without it goversioninfo emits a 32-bit (i386)
          # resource that the amd64 linker rejects ("incompatible architecture").
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1 \
            -64 \
            -icon=cmd/gosched-gui/icon.ico \
            -o=cmd/gosched-gui/resource_windows_amd64.syso \
            cmd/gosched-gui/versioninfo.json

      # WiX v5 builds the Windows .msi from build/windows/goschedule.wxs.
      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Pin WiX and its extensions to the SAME version — a floating extension
          # version (e.g. 7.x) is incompatible with a 5.x toolset (WIX6101).
          dotnet tool install --global wix --version 5.0.2
          wix --version
          # Extensions used by goschedule.wxs: WixUI (install wizard) + Util
          # (CloseApplication for stale-daemon termination).
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2

      - name: Build the self-contained desktop bundle (GUI + daemon + CLI)
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="-s -w -X github.com/shruggietech/go-schedule/internal/buildinfo.Version=${VERSION}"
          stage="go-schedule-desktop_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$stage"
          # GUI: windowless on Windows. It auto-starts the daemon if none is running.
          go build -ldflags "$BASE ${{ matrix.ldflags }}" -o "$stage/gosched-gui${{ matrix.ext }}" ./cmd/gosched-gui
          # Bundle the daemon and CLI so the GUI is self-contained.
          go build -ldflags "$BASE" -o "$stage/goschedd${{ matrix.ext }}" ./cmd/goschedd
          go build -ldflags "$BASE" -o "$stage/gosched${{ matrix.ext }}" ./cmd/gosched
          cp README.md LICENSE CHANGELOG.md "$stage/"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # Wrap the GUI in a .app so Finder/Dock show the icon. The daemon and
            # CLI live beside the GUI binary inside the bundle, so the GUI's
            # "daemon next to me" autostart lookup still resolves.
            app="$stage/gosched-gui.app"
            mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
            mv "$stage/gosched-gui" "$stage/goschedd" "$stage/gosched" "$app/Contents/MacOS/"
            # Build the .icns from the source PNG with Apple's own tools (canonical,
            # always valid) rather than committing a pre-baked icns.
            iconset="$stage/icon.iconset"; mkdir -p "$iconset"
            sips -z 16 16   gui/assets/icon.png --out "$iconset/icon_16x16.png"      >/dev/null
            sips -z 32 32   gui/assets/icon.png --out "$iconset/icon_16x16@2x.png"   >/dev/null
            sips -z 32 32   gui/assets/icon.png --out "$iconset/icon_32x32.png"      >/dev/null
            sips -z 64 64   gui/assets/icon.png --out "$iconset/icon_32x32@2x.png"   >/dev/null
            sips -z 128 128 gui/assets/icon.png --out "$iconset/icon_128x128.png"    >/dev/null
            sips -z 256 256 gui/assets/icon.png --out "$iconset/icon_128x128@2x.png" >/dev/null
            sips -z 256 256 gui/assets/icon.png --out "$iconset/icon_256x256.png"    >/dev/null
            sips -z 512 512 gui/assets/icon.png --out "$iconset/icon_256x256@2x.png" >/dev/null
            sips -z 512 512 gui/assets/icon.png --out "$iconset/icon_512x512.png"    >/dev/null
            cp gui/assets/icon.png "$iconset/icon_512x512@2x.png"
            iconutil -c icns "$iconset" -o "$app/Contents/Resources/icon.icns"
            rm -rf "$iconset"
            cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>go-schedule</string>
            <key>CFBundleDisplayName</key><string>go-schedule</string>
            <key>CFBundleExecutable</key><string>gosched-gui</string>
            <key>CFBundleIdentifier</key><string>tech.shruggie.goschedule</string>
            <key>CFBundleShortVersionString</key><string>${VERSION#v}</string>
            <key>CFBundleIconFile</key><string>icon.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          fi
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Windows ships ONLY as a formal .msi (no portable zip). The three exes
            # were built into "$stage"; hand that folder to WiX as the stage dir.
            pwsh build/windows/verify_wxs.ps1 -StageDir "$stage"
            VER_NUMERIC="${VERSION#v}"
            wix build build/windows/goschedule.wxs -arch x64 \
              -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext \
              -d Version="${VER_NUMERIC}" \
              -d StageDir="$(pwd -W 2>/dev/null || pwd)/${stage}" \
              -o "dist/go-schedule_${VERSION}_windows_amd64.msi"
          else
            tar -czf "dist/${stage}.tar.gz" "$stage"
          fi
          ls -la dist

      - name: Attach GUI artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
