name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build & publish release binaries (daemon + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build, package, and checksum all platforms
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/shruggietech/go-scheduler/internal/buildinfo.Version=${VERSION}"
          mkdir -p dist

          # The daemon (goschedd) and CLI (gosched) are cgo-free and cross-compile
          # cleanly. The desktop GUI (gosched-gui) requires a per-OS native build
          # (Fyne/OpenGL) and is not part of these cross-compiled archives yet.
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
          for target in $targets; do
            os=${target%/*}; arch=${target#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"

            stage="go-scheduler_${VERSION}_${os}_${arch}"
            mkdir -p "$stage"
            echo "==> $os/$arch"
            GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "$stage/goschedd${ext}" ./cmd/goschedd
            GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "$stage/gosched${ext}" ./cmd/gosched
            cp README.md LICENSE CHANGELOG.md "$stage/"

            if [ "$os" = "windows" ]; then
              zip -qr "dist/${stage}.zip" "$stage"
            else
              tar -czf "dist/${stage}.tar.gz" "$stage"
            fi
            rm -rf "$stage"
          done

          ( cd dist && sha256sum * > SHA256SUMS.txt )
          echo "--- artifacts ---"; ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Cross-platform **go-scheduler**.

            **Desktop users — download `go-scheduler-desktop_<os>_<arch>`.** It is
            self-contained (GUI + daemon + CLI). Just run `gosched-gui` — it starts the
            background daemon automatically the first time, no setup required.

            **Servers / headless — download `go-scheduler_<os>_<arch>`** (daemon + CLI only).
            Register it to start on boot:

            ```
            sudo ./gosched service install   # admin/root required
            sudo ./gosched service start
            ```

            Verify downloads against `SHA256SUMS.txt`. See the README for details and the
            Windows install guide.
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt

  gui:
    name: Build & publish GUI (${{ matrix.os }})
    needs: binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            ldflags: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            ldflags: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            ldflags: "-H windowsgui"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev

      # Embed the .exe file icon (shown in Explorer/taskbar) via a generated COFF
      # resource. The .syso is built here, not committed: a Windows-format .syso
      # would break the CGO-free `go build ./...` path on other platforms, and it
      # only links cleanly under the external (cgo) linker the GUI build uses.
      - name: Generate Windows executable icon resource
        if: runner.os == 'Windows'
        shell: bash
        run: |
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1 \
            -icon=cmd/gosched-gui/icon.ico \
            -o=cmd/gosched-gui/resource_windows_amd64.syso \
            cmd/gosched-gui/versioninfo.json

      - name: Build the self-contained desktop bundle (GUI + daemon + CLI)
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="-s -w -X github.com/shruggietech/go-scheduler/internal/buildinfo.Version=${VERSION}"
          stage="go-scheduler-desktop_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$stage"
          # GUI: windowless on Windows. It auto-starts the daemon if none is running.
          go build -ldflags "$BASE ${{ matrix.ldflags }}" -o "$stage/gosched-gui${{ matrix.ext }}" ./cmd/gosched-gui
          # Bundle the daemon and CLI so the GUI is self-contained.
          go build -ldflags "$BASE" -o "$stage/goschedd${{ matrix.ext }}" ./cmd/goschedd
          go build -ldflags "$BASE" -o "$stage/gosched${{ matrix.ext }}" ./cmd/gosched
          cp README.md LICENSE CHANGELOG.md "$stage/"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # Wrap the GUI in a .app so Finder/Dock show the icon. The daemon and
            # CLI live beside the GUI binary inside the bundle, so the GUI's
            # "daemon next to me" autostart lookup still resolves.
            app="$stage/gosched-gui.app"
            mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
            mv "$stage/gosched-gui" "$stage/goschedd" "$stage/gosched" "$app/Contents/MacOS/"
            # Build the .icns from the source PNG with Apple's own tools (canonical,
            # always valid) rather than committing a pre-baked icns.
            iconset="$stage/icon.iconset"; mkdir -p "$iconset"
            sips -z 16 16   gui/assets/icon.png --out "$iconset/icon_16x16.png"      >/dev/null
            sips -z 32 32   gui/assets/icon.png --out "$iconset/icon_16x16@2x.png"   >/dev/null
            sips -z 32 32   gui/assets/icon.png --out "$iconset/icon_32x32.png"      >/dev/null
            sips -z 64 64   gui/assets/icon.png --out "$iconset/icon_32x32@2x.png"   >/dev/null
            sips -z 128 128 gui/assets/icon.png --out "$iconset/icon_128x128.png"    >/dev/null
            sips -z 256 256 gui/assets/icon.png --out "$iconset/icon_128x128@2x.png" >/dev/null
            sips -z 256 256 gui/assets/icon.png --out "$iconset/icon_256x256.png"    >/dev/null
            sips -z 512 512 gui/assets/icon.png --out "$iconset/icon_256x256@2x.png" >/dev/null
            sips -z 512 512 gui/assets/icon.png --out "$iconset/icon_512x512.png"    >/dev/null
            cp gui/assets/icon.png "$iconset/icon_512x512@2x.png"
            iconutil -c icns "$iconset" -o "$app/Contents/Resources/icon.icns"
            rm -rf "$iconset"
            cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>go-scheduler</string>
            <key>CFBundleDisplayName</key><string>go-scheduler</string>
            <key>CFBundleExecutable</key><string>gosched-gui</string>
            <key>CFBundleIdentifier</key><string>tech.shruggie.goscheduler</string>
            <key>CFBundleShortVersionString</key><string>${VERSION#v}</string>
            <key>CFBundleIconFile</key><string>icon.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          fi
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "dist/${stage}.zip" "$stage" >/dev/null
          else
            tar -czf "dist/${stage}.tar.gz" "$stage"
          fi
          ls -la dist

      - name: Attach GUI artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
