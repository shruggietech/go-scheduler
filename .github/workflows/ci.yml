name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l internal cmd test)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      # Run via `go run` so golangci-lint is compiled with the runner's Go
      # toolchain (the prebuilt release binaries are built with an older Go and
      # refuse a module targeting a newer Go language version).
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6 run ./...

  test:
    name: Test (race) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # The race detector requires cgo; the CI runners provide a C toolchain.
      - name: go test -race
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  coverage:
    name: Coverage gate (core packages ≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Measure core-package statement coverage
        run: |
          go test -coverpkg=./internal/engine,./internal/schedule,./internal/timezone,./internal/store,./internal/trigger,./internal/catchup \
            ./... -coverprofile=cover.out >/dev/null
          python3 - <<'PY'
          import collections, sys
          blocks = {}
          for line in open('cover.out').readlines()[1:]:
              line = line.strip()
              if not line:
                  continue
              key, n, c = line.rsplit(' ', 2)
              n, c = int(n), int(c)
              blocks[key] = (n, max(blocks.get(key, (n, 0))[1], c))
          pkg = collections.defaultdict(lambda: [0, 0])
          for key, (n, c) in blocks.items():
              short = key.split('internal/')[1].split('/')[0]
              pkg[short][1] += n
              if c > 0:
                  pkg[short][0] += n
          core = ['engine', 'schedule', 'timezone', 'store', 'trigger', 'catchup']
          failed = False
          for p in core:
              cov, tot = pkg[p]
              pct = 100 * cov / tot if tot else 0
              status = 'OK' if pct >= 80 else 'FAIL'
              if pct < 80:
                  failed = True
              print(f"{p:10}{pct:6.1f}%  {status}")
          sys.exit(1 if failed else 0)
          PY

  build:
    name: Cross-compile (daemon + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all targets (cgo-free)
        env:
          CGO_ENABLED: "0"
        run: |
          set -e
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${target%/*}; arch=${target#*/}
            echo "building $os/$arch"
            GOOS=$os GOARCH=$arch go build -o /dev/null ./cmd/goschedd ./cmd/gosched
          done

  gui:
    name: GUI build & test (cgo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev
      - name: Build GUI (cgo + OpenGL driver)
        env:
          CGO_ENABLED: "1"
        run: go build -o /dev/null ./cmd/gosched-gui
      - name: Test GUI (headless)
        env:
          CGO_ENABLED: "1"
        run: go test ./gui/...
